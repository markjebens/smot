<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMOT | Contact</title>
    <!-- Brutalist fonts: Inter for bold headings, JetBrains Mono for metadata -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="assets/style.css">

    <!-- SpectraNoise WebGL script -->
    <script src="assets/spectra-noise.js"></script>
</head>

<body>
    <!-- Full viewport WebGL background -->
    <canvas id="spectra-bg"></canvas>

    <!-- Dark overlay to ensure text readability -->
    <div class="bg-overlay"></div>

    <main class="main-content">
        <!-- Header / Identity -->
        <header class="header">
            <h1 class="logo">Single Mother of Two</h1>
            <a href="index.html" class="close-btn" style="margin-left: 2rem;">(Back to Menu...)</a>
        </header>

        <!-- Left-aligned Contact form -->
        <div style="width: 100%; max-width: 600px; margin-top: 4rem;">
            <div class="section-header">
                <h2 class="section-title">Contact</h2>
            </div>

            <form id="contact-form" class="contact-form" novalidate>
                <div style="display: flex; flex-direction: column; text-align: left;">
                    <label for="contact-name">Name</label>
                    <input id="contact-name" name="name" type="text" autocomplete="name" required>
                </div>

                <div style="display: flex; flex-direction: column; text-align: left;">
                    <label for="contact-email">Email</label>
                    <input id="contact-email" name="email" type="email" autocomplete="email" required>
                </div>

                <div style="display: flex; flex-direction: column; text-align: left;">
                    <label for="contact-subject">Subject</label>
                    <input id="contact-subject" name="subject" type="text" required>
                </div>

                <div style="display: flex; flex-direction: column; text-align: left;">
                    <label for="contact-message">Message</label>
                    <textarea id="contact-message" name="message" required></textarea>
                </div>

                <input id="contact-honeypot" name="company" type="text" tabindex="-1" autocomplete="off"
                    aria-hidden="true">
                <input id="contact-started-at" name="started_at" type="hidden">
                <input id="contact-interacted" name="interacted" type="hidden" value="0">

                <button type="submit" class="btn-text"
                    style="background: none; border: none; cursor: pointer; text-align: left; padding: 1rem 0; font-size: 1.2rem; margin-top: 1rem;">[
                    SEND MESSAGE ]</button>
                <p id="contact-form-status" class="contact-status" aria-live="polite"
                    style="font-family: var(--font-mono); margin-top: 1rem;"></p>
            </form>

            <div style="margin-top: 4rem; font-family: var(--font-mono); text-align: left;">
                <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Direct email:</p>
                <a href="mailto:booking@singlemotheroftwo.com"
                    style="font-size: 1.2rem; font-weight: 600;">booking@singlemotheroftwo.com</a>
            </div>
        </div>
    </main>

    <!-- Digital clock style footer -->
    <footer class="footer">
        <div class="footer-meta">
            <span>Last Updated:
                <script>document.write(new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'numeric', year: '2-digit' }))</script>
            </span>
            <span id="clock" class="clock">00:00:00</span>
        </div>
        <div class="footer-links">
            <a href="terms.html" target="_blank" rel="noopener noreferrer">Terms of use</a>
            <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a>
            <a href="cookies.html" target="_blank" rel="noopener noreferrer">Cookies</a>
            <a href="cookies.html#settings" target="_blank" rel="noopener noreferrer">Cookie Settings</a>
            <span>© 2026 SMOT</span>
        </div>
    </footer>

    <script src="assets/main.js"></script>
    <script src="assets/contact.js"></script>
    <script src="assets/cookies.js"></script>
</body>

</html>
